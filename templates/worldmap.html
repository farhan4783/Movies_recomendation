{% extends "base.html" %}

{% block title %}World Map - Movie Maverick{% endblock %}

{% block content %}
<div class="worldmap-container">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h1 class="hero-title">Global <span class="highlight">Cinema</span> 🗺️</h1>
        <p style="color: var(--text-secondary);">Click on a country to discover its most popular movies.</p>
    </div>

    <!-- Pre-defined regions for quick clicks -->
    <div class="region-chips">
        <button class="region-chip" data-code="US">🇺🇸 USA</button>
        <button class="region-chip" data-code="JP">🇯🇵 Japan (Anime)</button>
        <button class="region-chip" data-code="KR">🇰🇷 South Korea (K-Drama)</button>
        <button class="region-chip" data-code="IN">🇮🇳 India (Bollywood)</button>
        <button class="region-chip" data-code="FR">🇫🇷 France</button>
        <button class="region-chip" data-code="GB">🇬🇧 UK</button>
        <button class="region-chip" data-code="IT">🇮🇹 Italy</button>
    </div>

    <div class="worldmap-svg-wrap glass-panel-glow">
        <!-- Minimal SVG World Map (Equirectangular) -->
        <svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
            <!-- Simplified basic shapes for demo. In production, embed a full high-poly path -->
            <!-- North America -->
            <path class="worldmap-country nav-item" data-code="CA" d="M150,100 L250,80 L300,120 L280,150 L180,130 Z">
                <title>Canada</title>
            </path>
            <path class="worldmap-country nav-item" data-code="US" d="M160,130 L280,150 L260,200 L160,190 Z">
                <title>United States</title>
            </path>
            <path class="worldmap-country nav-item" data-code="MX" d="M170,190 L240,200 L260,230 L190,240 Z">
                <title>Mexico</title>
            </path>
            
            <!-- South America -->
            <path class="worldmap-country nav-item" data-code="BR" d="M260,250 L340,280 L310,380 L270,330 Z">
                <title>Brazil</title>
            </path>
            <path class="worldmap-country nav-item" data-code="AR" d="M270,330 L310,380 L290,450 L260,400 Z">
                <title>Argentina</title>
            </path>

            <!-- Europe -->
            <path class="worldmap-country nav-item" data-code="GB" d="M440,130 Q460,120 450,150 Z">
                <title>United Kingdom</title>
            </path>
            <path class="worldmap-country nav-item" data-code="FR" d="M450,150 L480,140 L490,170 L460,180 Z">
                <title>France</title>
            </path>
            <path class="worldmap-country nav-item" data-code="DE" d="M480,140 L510,130 L520,160 L490,170 Z">
                <title>Germany</title>
            </path>
            <path class="worldmap-country nav-item" data-code="IT" d="M490,170 L520,160 L540,200 L510,190 Z">
                <title>Italy</title>
            </path>
            
            <!-- Asia -->
            <path class="worldmap-country nav-item" data-code="RU" d="M530,50 L900,50 L850,150 L500,120 Z">
                <title>Russia</title>
            </path>
            <path class="worldmap-country nav-item" data-code="CN" d="M680,160 L850,160 L820,250 L650,230 Z">
                <title>China</title>
            </path>
            <path class="worldmap-country nav-item" data-code="IN" d="M660,230 L730,240 L700,300 L640,280 Z">
                <title>India</title>
            </path>
            <path class="worldmap-country nav-item" data-code="JP" d="M870,160 Q890,180 860,210 Z">
                <title>Japan</title>
            </path>
            <path class="worldmap-country nav-item" data-code="KR" d="M840,170 L860,170 L850,190 Z">
                <title>South Korea</title>
            </path>

            <!-- Africa & Oceania -->
            <path class="worldmap-country nav-item" data-code="ZA" d="M500,350 L560,340 L540,420 L480,400 Z">
                <title>South Africa</title>
            </path>
            <path class="worldmap-country nav-item" data-code="AU" d="M780,350 L900,340 L880,440 L760,420 Z">
                <title>Australia</title>
            </path>
            
            <!-- More illustrative shapes could be added. Using text fallback for unmapped regions -->
            <text x="500" y="250" fill="rgba(255,255,255,0.2)" font-size="24" text-anchor="middle" style="pointer-events: none;">
                [Interactive SVG Map Concept]
            </text>
            <text x="500" y="280" fill="rgba(255,255,255,0.2)" font-size="14" text-anchor="middle" style="pointer-events: none;">
                Click regions or use the buttons above to explore.
            </text>
        </svg>
    </div>
</div>

<!-- Sidebar Overlay -->
<div class="worldmap-sidebar-overlay" id="sidebar-overlay"></div>

<!-- Sidebar -->
<div class="worldmap-sidebar" id="country-sidebar">
    <button class="nav-dropdown-trigger" id="close-sidebar" style="position: absolute; right: 1rem; top: 1rem; font-size: 1.5rem; background: rgba(255,255,255,0.1); width: 32px; height: 32px; border-radius: 50%; justify-content: center;">&times;</button>
    
    <div style="margin-bottom: 2rem; padding-right: 2rem;">
        <h2 id="sidebar-title" style="font-family: var(--font-heading); font-size: 1.8rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
            Country Name
        </h2>
        <p style="color: var(--text-secondary); font-size: 0.9rem;">Top popular films originating from this region.</p>
    </div>

    <div id="sidebar-content">
        <!-- Movie items injected here -->
        <div class="spinner spinner-md"></div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
document.addEventListener("DOMContentLoaded", () => {
    const sidebar = document.getElementById("country-sidebar");
    const overlay = document.getElementById("sidebar-overlay");
    const closeBtn = document.getElementById("close-sidebar");
    const sidebarContent = document.getElementById("sidebar-content");
    const sidebarTitle = document.getElementById("sidebar-title");
    
    const elements = document.querySelectorAll(".worldmap-country, .region-chip");
    
    // SVG tooltip functionality
    document.querySelectorAll(".worldmap-country").forEach(path => {
        path.addEventListener("mouseover", (e) => {
            const title = path.querySelector("title");
            if(title) {
                // If we wanted custom tooltips instead of standard browser ones, we'd manage a floating div here.
            }
        });
    });

    elements.forEach(el => {
        el.addEventListener("click", async () => {
            const code = el.dataset.code;
            if (!code) return;
            
            // UI state
            document.querySelectorAll(".worldmap-country, .region-chip").forEach(e => e.classList.remove("active"));
            if(el.tagName === 'path') {
                el.classList.add("active");
            } else {
                el.classList.add("active");
                // Highlight corresponding map path if it exists
                const path = document.querySelector(`.worldmap-country[data-code="${code}"]`);
                if(path) path.classList.add("active");
            }
            
            // Open sidebar
            sidebar.classList.add("open");
            overlay.classList.add("open");
            document.body.style.overflow = "hidden"; // Prevent background scroll
            
            sidebarContent.innerHTML = `<div style="text-align:center; padding: 2rem;"><div class="spinner spinner-md"></div><p style="margin-top:1rem; color:var(--text-secondary);">Exploring...</p></div>`;
            sidebarTitle.innerHTML = `...`;
            
            try {
                const res = await fetch(`/api/movies/by-region?country=${code}`);
                const data = await res.json();
                
                sidebarTitle.innerHTML = `<img src="https://flagcdn.com/24x18/${code.toLowerCase()}.png" alt="${code} flag" style="border-radius:3px;"> ${data.country}`;
                
                if (!data.results || data.results.length === 0) {
                    sidebarContent.innerHTML = '<p style="text-align:center; color: var(--text-tertiary);">No movies found for this region.</p>';
                    return;
                }
                
                let html = "";
                data.results.forEach((movie, idx) => {
                    const poster = movie.poster_path ? movie.poster_path : '/static/assets/default_poster.png';
                    const year = movie.release_date ? movie.release_date.split('-')[0] : '';
                    
                    html += `
                        <div class="worldmap-movie-item" style="animation: slideInRight 0.3s ease ${idx * 0.05}s both;" onclick="window.location.href='/movie/${movie.id}'">
                            <img src="${poster}" alt="${movie.title}" loading="lazy">
                            <div style="flex: 1;">
                                <h4 style="margin: 0 0 0.3rem 0; font-size: 1rem; line-height: 1.2;">${movie.title}</h4>
                                <div style="display: flex; gap: 0.5rem; font-size: 0.8rem; color: var(--text-secondary);">
                                    <span>${year}</span>
                                    <span style="color: var(--gold);">⭐ ${movie.vote_average}</span>
                                </div>
                                <p style="font-size: 0.8rem; color: var(--text-tertiary); margin-top: 0.4rem; display:-webkit-box; -webkit-line-clamp:2; line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${movie.overview}</p>
                            </div>
                        </div>
                    `;
                });
                
                sidebarContent.innerHTML = html;
                
            } catch (err) {
                console.error(err);
                sidebarContent.innerHTML = '<p style="color:var(--primary-color);">Failed to load movies.</p>';
                sidebarTitle.innerText = "Error";
            }
        });
    });
    
    // Close handlers
    const closeSidebar = () => {
        sidebar.classList.remove("open");
        overlay.classList.remove("open");
        document.body.style.overflow = "";
        document.querySelectorAll(".worldmap-country, .region-chip").forEach(e => e.classList.remove("active"));
    };
    
    closeBtn.addEventListener("click", closeSidebar);
    overlay.addEventListener("click", closeSidebar);
});
</script>
{% endblock %}
